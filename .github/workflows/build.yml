name: MeetScribe-AI CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-node: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Validate syntax
      run: node -c bot.js server.js transcriber.js
